<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart - ShopEasy</title>
  <link rel="stylesheet" href="style/cart.css">
</head>

<body>

  <!-- Header Section -->
  <header class="header">
    <h2 class="logo">ShopEasy</h2>

    <div class="header-actions">
      <a href="index.html">Back to Products</a>
      <a href="wishlist.html">Wishlist</a>
    </div>
  </header>

  <!-- Main Cart Section -->
  <main class="cart-main">
    <div class="cart-container">

      <!-- Left Side: Cart Items -->
      <section class="cart-items-section">
        <h2 class="section-title">Shopping Cart</h2>
        
        <div id="cartItemsContainer" class="cart-items-list">
          
          
          <!-- <div class="cart-item">
            <div class="item-image">
              <img src="product.jpg" alt="Product">
            </div>
            
            <div class="item-details">
              <h3 class="item-name">Product Name</h3>
              <p class="item-price">₹499</p>
            </div>

            <div class="item-quantity">
              <button class="qty-btn qty-decrease">-</button>
              <input type="number" class="qty-input" value="1" min="0">
              <button class="qty-btn qty-increase">+</button>
            </div>

            <div class="item-total">
              <p class="total-price">₹998</p>
            </div>

            <button class="item-remove-btn">x</button>
          </div>
           -->
          
        </div>

        <!-- Empty Cart Message -->
        <div id="emptyCartMessage" class="empty-cart-message" style="display: none;">
          <div class="empty-cart-icon">Cart</div>
          <h3>Your cart is empty</h3>
          <p>Add some products to get started!</p>
          <a href="index.html" class="btn-continue-shopping">Continue Shopping</a>
        </div>

      </section>

      <!-- Right Side- Cart Summary -->
      <aside class="cart-summary-section">
        <div class="cart-summary-card">
          <h3 class="summary-title">Order Summary</h3>

          <div class="summary-row">
            <span class="summary-label">Subtotal</span>
            <span id="summarySubtotal" class="summary-value">₹0</span>
          </div>

          <div class="summary-row">
            <span class="summary-label">Shipping</span>
            <span id="summaryShipping" class="summary-value">₹50</span>
          </div>

          <div class="summary-row">
            <span class="summary-label">Tax (5%)</span>
            <span id="summaryTax" class="summary-value">₹0</span>
          </div>

          <hr class="summary-divider">

          <div class="summary-row summary-total-row">
            <span class="summary-label-total">Total</span>
            <span id="summaryTotal" class="summary-value-total">₹0</span>
          </div>

          <button id="checkoutBtn" class="btn-checkout">Proceed to Checkout</button>
          
          <a href="index.html" class="link-continue-shopping"> Continue Shopping</a>
        </div>
      </aside>

    </div>
  </main>

  <script src="script/cart.js"></script>

</body>
</html>
