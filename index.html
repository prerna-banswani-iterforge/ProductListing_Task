<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Listing</title>

  <link rel="stylesheet" href="style/landing.css">
  <link rel="stylesheet" href="style/landing_modal.css">
</head

<body>
<header class="header">

  <h2 class="logo">ShopEasy</h2>

  <div class="search-box">
    <input type="text" placeholder="Search product..." />
  </div>

  <div class="header-actions">
    <a href="wishlist.html"> Wishlist</a>

    <a href="cart.html" class="cart-btn">
       Cart
      <span id="cartCount">0</span>
    </a>
  </div>

</header>



<section class="category-section">

  <h2>Products</h2>

  <div id="categoryFilters" class="category-filters">
    <!-- <div class="category-pill active">All Products</div>
    <div class="category-pill">Furniture</div>
    <div class="category-pill">Electronic</div>
    <div class="category-pill">Shoes</div>
  </div> -->

</section>



<main>
  <div id="productContainer" class="product-grid"></div>
</main>

<!-- Modal Section -->

<div id="wishlistModal" class="modal-overlay">
  <div class="modal-content">
    
    <!-- Modal Header -->
    <div class="modal-header">
      <h3>Add to Wishlist</h3>
      <button class="modal-close-btn" id="closeModalBtn">&times;</button>
    </div>

    <!-- Modal Body -->
    <div class="modal-body">
      
      <!-- Wishlist Dropdown Selection -->
      <div class="wishlist-selection">
        <label for="wishlistDropdown">Select Wishlist</label>
        
        <select id="wishlistDropdown" class="wishlist-dropdown">
          <!-- <option value="">Choose a wishlist...</option>
          <option value="1">Default Wishlist</option>
          <option value="2">Christmas Gifts</option>
          <option value="3">Birthday Ideas</option> -->
          
          <option value="new">+ Create New Wishlist</option>
        </select>

        <!-- <div id="newWishlistInput" class="new-wishlist-input" style="display: none;">
          <input 
            type="text" 
            id="newWishlistName" 
            placeholder="Enter wishlist name..."
          >
        </div> -->
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModalBtn">Cancel</button>
      <button class="btn-add-to-wishlist" id="addToWishlistBtn">Add to Wishlist</button>
    </div>

  </div>
</div>


<script src="script/landing.js"></script>

</body>
</html>
